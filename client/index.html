    <title>FloLup - Feel the music</title>
    <style>
      body,
      html {
        background: #050505;
        color: #fff;
        margin: 0;
        font-family: "Clash Display", "Space Grotesk", "Sora", "Manrope", "Inter", system-ui, sans-serif;
      }
      #preload-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #050505;
        z-index: 9999;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        color: #fff;
        font-family: "Clash Display", "Space Grotesk", "Sora", "Manrope", "Inter", system-ui, sans-serif;
        font-weight: 800;
      }
      #preload-splash.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        min-height: 100vh;
        text-align: center;
      }
      .splash-badge {
        width: 160px;
        height: 160px;
        display: grid;
        place-items: center;
        font-weight: 800;
        letter-spacing: 0.2em;
        color: #E4C421;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="preload-splash" class="preload-splash">
      <div class="splash-content">
        <div class="splash-badge">
          <img src="/sitemark.svg" alt="FloLup splash logo" width="160" height="160" style="width:160px;height:160px;" />
        </div>
      </div>
    </div>
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
